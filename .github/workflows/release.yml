name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v0.1.1"
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  setup:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      owner_lc: ${{ steps.meta.outputs.owner_lc }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '$TAG' does not match vX.Y.Z" >&2
            exit 1
          fi
          OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
            echo "owner_lc=$OWNER_LC"
          } >> "$GITHUB_OUTPUT"

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.owner_lc }}/postgresql-access-operator:${{ needs.setup.outputs.version }}
            ${{ env.REGISTRY }}/${{ needs.setup.outputs.owner_lc }}/postgresql-access-operator:latest
          labels: |
            org.opencontainers.image.title=postgresql-access-operator
            org.opencontainers.image.description=Kubernetes operator for managing PostgreSQL databases, roles, and grants
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.setup.outputs.version }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [setup, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          generate_release_notes: true

  helm-oci:
    name: Publish Helm charts to GHCR (OCI)
    runs-on: ubuntu-latest
    needs: [setup, release]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} --password-stdin

      - name: Package and push CRDs chart
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          OWNER_LC: ${{ needs.setup.outputs.owner_lc }}
        run: |
          helm package charts/crds \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination .helm-packages
          helm push ".helm-packages/postgresql-access-operator-crds-${VERSION}.tgz" \
            "oci://${{ env.REGISTRY }}/${OWNER_LC}/charts"

      - name: Package and push operator chart
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          OWNER_LC: ${{ needs.setup.outputs.owner_lc }}
        run: |
          helm package charts/operator \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination .helm-packages
          helm push ".helm-packages/postgresql-access-operator-${VERSION}.tgz" \
            "oci://${{ env.REGISTRY }}/${OWNER_LC}/charts"

  helm-pages:
    name: Publish Helm charts to gh-pages
    runs-on: ubuntu-latest
    needs: [setup, release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.tag }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package CRDs chart
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          helm package charts/crds \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination .cr-release-packages

      - name: Package operator chart
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          helm package charts/operator \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination .cr-release-packages

      - name: Publish chart repository to gh-pages
        env:
          OWNER_LC: ${{ needs.setup.outputs.owner_lc }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${OWNER_LC}.github.io/${REPO_NAME}"
          WORKTREE_DIR="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add "$WORKTREE_DIR" origin/gh-pages
          else
            git worktree add --detach "$WORKTREE_DIR"
            (
              cd "$WORKTREE_DIR"
              git checkout --orphan gh-pages
              rm -rf ./*
            )
          fi

          cp .cr-release-packages/*.tgz "$WORKTREE_DIR"/

          if [ -f "$WORKTREE_DIR/index.yaml" ]; then
            helm repo index "$WORKTREE_DIR" \
              --url "$PAGES_URL" \
              --merge "$WORKTREE_DIR/index.yaml"
          else
            helm repo index "$WORKTREE_DIR" \
              --url "$PAGES_URL"
          fi

          (
            cd "$WORKTREE_DIR"
            git add *.tgz index.yaml
            if git diff --cached --quiet; then
              echo "No gh-pages changes to publish"
              exit 0
            fi
            git commit -m "Publish Helm charts for ${GITHUB_REF_NAME:-${{ needs.setup.outputs.tag }}}"
            git push origin HEAD:gh-pages
          )

          git worktree remove "$WORKTREE_DIR"
